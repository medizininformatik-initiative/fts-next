projects:
  directory: "src/test/resources/projects"

spring:
  ssl:
    bundle:
      pem:
        server:
          keystore:
            certificate: classpath:/server-localhost.crt
            private-key: classpath:/server-localhost.key
          truststore:
            certificate: classpath:/ca.crt
        client:
          truststore:
            certificate: classpath:/ca.crt

runner:
  maxConcurrentPatients: 8
  maxSendConcurrency: 2
  maxConcurrentProcesses: 4
  processTtl: P1D

server:
  ssl:
    bundle: server

test:
  webclient:
    default:
      ssl:
        bundle: client
    unauthorized:
      ssl:
        bundle: client
    incorrect:
      ssl:
        bundle: client

security:
  endpoints:
  - path: /api/v2/**
    role: cd-client

logging.level:
  care.smith.fts: DEBUG
  care.smith.fts.cda: TRACE
