spring:
  ssl:
    bundle:
      pem:
        client:
          keystore:
            certificate: classpath:/client-default.crt
            private-key: classpath:/client-default.key
          truststore:
            certificate: classpath:/ca.crt
        unauthorized:
          truststore:
            certificate: classpath:/ca.crt

server:
  ssl:
    client-auth: want

security:
  auth:
    client-cert:
      users:
      - username: default
        role: client

test:
  webclient:
    unauthorized:
      ssl:
        bundle: unauthorized
