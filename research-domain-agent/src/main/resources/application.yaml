spring:
  jackson:
    time-zone: ${TZ:Europe/Berlin}

management:
  endpoints:
    web:
      exposure:
        include: [ "health", "info", "prometheus" ]

  metrics:
    distribution.slo:
      http.server.requests: 25,100,250,500,1000,10000
      http.client.requests: 25,100,250,500,1000,10000
      fetchSecureMapping: 5,10,25,100,250,500,1000,5000,10000
      deidentify: 25,100,250,500,1000,10000
      sendBundleToHds: 25,50,100,250,500,1000,2000,5000,10000

security:
  endpoints:
  - path: /api/v2/**
    role: cd-agent

runner:
  maxConcurrentTransactions: 2
  retryAfterSeconds: 5
  processTtl: PT10M

springdoc:
  api-docs:
    path: /api/v2/openapi
