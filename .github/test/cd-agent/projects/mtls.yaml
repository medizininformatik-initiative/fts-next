### FTS Project Configuration — mTLS scenario
##! https://medizininformatik-initiative.github.io/fts-next/cd-agent/project

cohortSelector:
  # FHIR-backed consent on cd-hds (no gics dependency in the mtls leg).
  # mTLS is still exercised on the three inter-agent hops:
  # CDA→TCA (deidentification), CDA→RDA (bundle send), RDA→TCA (idMapper).
  fhir:
    server:
      baseUrl: http://cd-hds:8080/fhir
    patientIdentifierSystem: "http://fts.smith.care"
    policySystem: "urn:oid:2.16.840.1.113883.3.1937.777.24.5.3"
    policies:
    - 2.16.840.1.113883.3.1937.777.24.5.3.2
    - 2.16.840.1.113883.3.1937.777.24.5.3.3
    - 2.16.840.1.113883.3.1937.777.24.5.3.6
    - 2.16.840.1.113883.3.1937.777.24.5.3.7

dataSelector:
  everything:
    fhirServer:
      baseUrl: http://cd-hds:8080/fhir
    pageSize: 500

deidentificator:
  deidentifhir:
    trustCenterAgent:
      server:
        baseUrl: https://tc-agent:8080
        ssl:
          bundle: tca-mtls
      domains:
        pseudonym: MII
        salt: MII
        dateShift: MII
    maxDateShift: P14D
    dateShiftPreserve: NONE
    deidentifhirConfig: /app/projects/example/deidentifhir/CDtoTransport.profile

bundleSender:
  researchDomainAgent:
    server:
      baseUrl: https://rd-agent:8080
      ssl:
        bundle: rda-mtls
    project: mtls
