logging.level:
  care.smith.fts: DEBUG

spring:
  ssl:
    bundle:
      pem:
        tca:
          keystore:
            certificate: file:ssl/client-rd-agent.crt
            private-key: file:ssl/client-rd-agent.key
          truststore:
            certificate: file:ssl/ca.crt

security:
  auth:
    oauth2:
      issuer: http://keycloak:8080/realms/fts

spring.codec.max-in-memory-size: 5MB
