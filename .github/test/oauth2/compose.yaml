name: keycloak

networks:
  agents:

services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.6.3@sha256:5fdbf2dbb5897cc34e82de49d13e23db011f9925089dbc555fc095f2c8bc1dac
    command:
    - start-dev
    - --import-realm
    networks: [ "agents" ]
    ports: [ "8080:8080" ]
    volumes:
    - ./import:/opt/keycloak/data/import
    environment:
      KC_HEALTH_ENABLED: true
    healthcheck:
      test: [ "CMD-SHELL", "{ printf 'HEAD /health/ready HTTP/1.0\r\n\r\n' >&0; grep 'HTTP/1.0 200'; } 0<>/dev/tcp/localhost/9000" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 150s
