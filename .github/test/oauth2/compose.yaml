name: keycloak

networks:
  agents:

services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.6.3@sha256:9b0330756022422149aa6502eb2def8cd47c6e1b000c7c65cdb13e7c0133e992
    command:
    - start-dev
    - --import-realm
    networks: [ "agents" ]
    ports: [ "8080:8080" ]
    volumes:
    - ./import:/opt/keycloak/data/import
    environment:
      KC_HEALTH_ENABLED: true
    healthcheck:
      test: [ "CMD-SHELL", "{ printf 'HEAD /health/ready HTTP/1.0\r\n\r\n' >&0; grep 'HTTP/1.0 200'; } 0<>/dev/tcp/localhost/9000" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 150s
