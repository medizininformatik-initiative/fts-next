name: keycloak

networks:
  agents:

services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.6.4@sha256:20e96e40e673ffa474ac4da56c91cb0adba28b8571bd274ce255e6120265c1f4
    command:
    - start-dev
    - --import-realm
    networks: [ "agents" ]
    ports: [ "8080:8080" ]
    volumes:
    - ./import:/opt/keycloak/data/import
    environment:
      KC_HEALTH_ENABLED: true
    healthcheck:
      test: [ "CMD-SHELL", "{ printf 'HEAD /health/ready HTTP/1.0\r\n\r\n' >&0; grep 'HTTP/1.0 200'; } 0<>/dev/tcp/localhost/9000" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 150s
