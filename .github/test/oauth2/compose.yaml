name: keycloak

networks:
  agents:

services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.6.4@sha256:0aae0de7fca85525f727d3354df17896092de8bb26ae4c12d89c77e5df8cbce4
    command:
    - start-dev
    - --import-realm
    networks: [ "agents" ]
    ports: [ "8080:8080" ]
    volumes:
    - ./import:/opt/keycloak/data/import
    environment:
      KC_HEALTH_ENABLED: true
    healthcheck:
      test: [ "CMD-SHELL", "{ printf 'HEAD /health/ready HTTP/1.0\r\n\r\n' >&0; grep 'HTTP/1.0 200'; } 0<>/dev/tcp/localhost/9000" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 150s
