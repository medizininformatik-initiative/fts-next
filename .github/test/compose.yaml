name: fts-test

networks:
  agents:
  clinical-domain:
  research-domain:
  trust-center:
  gics:
  gpas:

include:
- cd-agent/compose.yaml
- rd-agent/compose.yaml
- tc-agent/compose.yaml
- oauth2/compose.yaml

services:
  # Clinical Domain
  cd-hds:
    image: samply/blaze:1.7.0@sha256:f2e87759605587eaf9cbbf86e229938019a732bb908d4e59f107a2744e73825f
    ports: [ ":8080" ]
    networks: [ "clinical-domain" ]
    environment:
      BASE_URL: "http://cd-hds:8080"
    healthcheck:
      test: [ "CMD", "curl", "-sSf", "http://localhost:8080/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 90s

  # Research Domain
  rd-hds:
    image: samply/blaze:1.7.0@sha256:f2e87759605587eaf9cbbf86e229938019a732bb908d4e59f107a2744e73825f
    ports: [ ":8080" ]
    networks: [ "research-domain" ]
    environment:
      BASE_URL: "http://rd-hds:8080"
      ENFORCE_REFERENTIAL_INTEGRITY: "false"
    healthcheck:
      test: [ "CMD", "curl", "-sSf", "http://localhost:8080/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 90s

  # Trust Center
  gics:
    image: mosaicgreifswald/gics:2025.2.2@sha256:aef44232b0e6ae5f352ec96e224f4d4d3482867699ccbce22cc0f404d9eea5c2
    ports: [ ":8080" ]
    networks: [ "gics", "trust-center" ]
    restart: on-failure:3
    environment:
      TTP_GICS_DB_HOST: "gics-db"
      WF_NO_ADMIN: "true"
      MOS_INCLUDE_PROCESSES: "wildfly"
    depends_on:
      gics-db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-sSf", "http://localhost:8080/ttp-fhir/fhir/gics/metadata" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 300s
  gics-db:
    image: mysql:9.7.0@sha256:f0ef1d92fa650fcfa5b85f1d82bb1a56a6dd579bf256b8f8f2a5a0b1b61c8b0b
    volumes:
    - ./gics/initdb/:/docker-entrypoint-initdb.d
    command: --max_allowed_packet=20M --default-time-zone=Europe/Berlin
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gics
      MYSQL_USER: gics_user
      MYSQL_PASSWORD: gics_password
    networks: [ "gics" ]
    healthcheck:
      test: [ "CMD", "/usr/bin/mysql", "-h", "localhost", "-ugics_user", "-pgics_password", "gics", "-e", "SELECT ready FROM _ready LIMIT 1" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 120s
  gpas:
    image: mosaicgreifswald/gpas:2025.2.1@sha256:7c371a43b19e761d079e64d50c46f1b886324836e1a6c8fd5dc727ec1ddf7aab
    ports: [ ":8080" ]
    networks: [ "gpas", "trust-center" ]
    restart: on-failure:3
    environment:
      TTP_GPAS_DB_HOST: "gpas-db"
      WF_NO_ADMIN: "true"
      MOS_INCLUDE_PROCESSES: "wildfly"
    depends_on:
      gpas-db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-sSf", "http://localhost:8080/ttp-fhir/fhir/gpas/metadata" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 300s
  gpas-db:
    image: mysql:9.7.0@sha256:f0ef1d92fa650fcfa5b85f1d82bb1a56a6dd579bf256b8f8f2a5a0b1b61c8b0b
    volumes:
    - ./gpas/initdb/:/docker-entrypoint-initdb.d
    command: --max_allowed_packet=20M --default-time-zone=Europe/Berlin
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gpas
      MYSQL_USER: gpas_user
      MYSQL_PASSWORD: gpas_password
    networks: [ "gpas" ]
    healthcheck:
      test: [ "CMD", "/usr/bin/mysql", "-h", "localhost", "-ugpas_user", "-pgpas_password", "gpas", "-e", "SELECT ready FROM _ready LIMIT 1" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 120s
