logging.level:
  care.smith.fts: DEBUG

spring:
  ssl:
    bundle:
      pem:
        tca-mtls:
          keystore:
            certificate: file:ssl/client-cd-agent.crt
            private-key: file:ssl/client-cd-agent.key
          truststore:
            certificate: file:ssl/ca.crt
        rda-mtls:
          keystore:
            certificate: file:ssl/client-cd-agent.crt
            private-key: file:ssl/client-cd-agent.key
          truststore:
            certificate: file:ssl/ca.crt
        rda-mtls-bad:
          truststore:
            certificate: file:ssl/ca.crt
  codec:
    max-in-memory-size: 5MB
