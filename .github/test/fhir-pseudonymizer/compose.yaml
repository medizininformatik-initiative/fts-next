name: fts-fhir-pseudonymizer

services:
  fhir-pseudonymizer:
    image: ghcr.io/miracum/fhir-pseudonymizer:local-build
    ports: [ ":8080" ]
    networks: [ "clinical-domain", "agents" ]
    environment:
      PseudonymizationService: Mii
      Mii__Url: https://tc-agent:8080/api/v2/cd/fhir/
      Mii__Auth__Basic__Username: cd-agent
      Mii__Auth__Basic__Password: Aj6cloJYsTpu+op+
      AnonymizationEngineConfigPath: /etc/anonymization.yaml
      SSL_CERT_FILE: /etc/ssl/certs/ca.crt
    volumes:
    - ./anonymization.yaml:/etc/anonymization.yaml:ro
    - ../ssl/ca.crt:/etc/ssl/certs/ca.crt:ro
    depends_on:
      tc-agent:
        condition: service_healthy
