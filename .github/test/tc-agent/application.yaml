logging.level:
  care.smith.fts: DEBUG

spring:
  ssl:
    bundle:
      pem:
        server:
          keystore:
            certificate: file:ssl/server.crt
            private-key: file:ssl/server.key
          truststore:
            certificate: file:ssl/ca.crt

server:
  ssl:
    bundle: server
    client-auth: want

security:
  auth:
    client-cert:
      users:
      - username: cd-agent
        role: cd-client
      - username: rd-agent
        role: rd-client
  endpoints:
  - path: /api/v2/cd/**
    role: cd-client
  - path: /api/v2/rd/**
    role: rd-client

spring.codec.max-in-memory-size: 5MB
