name: fts-tc-agent

networks:
  tc-agent:

services:
  tc-agent:
    image: ghcr.io/medizininformatik-initiative/fts/trust-center-agent:${BUILD_ID:-local}
    ports: [ ":8080" ]
    volumes:
    - ./application.yaml:/app/application.yaml
    - ../ssl:/app/ssl:ro                                                                   # CI_ONLY
    networks:
    - tc-agent
    - agents                                                                               # CI_ONLY
    - trust-center                                                                         # CI_ONLY
    depends_on:
      keystore:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "--no-check-certificate", "https://localhost:8080/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s
  keystore:
    image: valkey/valkey:9.0.4-alpine@sha256:d1cc70645bbcef743615463a2fa4616e841407545e18f560aed0c49671a90147
    networks: [ "tc-agent" ]
    healthcheck:
      test: [ "CMD", "redis-cli", "--raw", "incr", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
